<script>
(function() {
  'use strict';

  /* ═══ CONFIG ═══ */
  var TEMPLATE_URL = 'https://autonahariya-a11y.github.io/tecdoc-data/product-template.html';
  var TIMEOUT_MS = 8000;

  /* ═══ DETECT AUTO PARTS PRODUCT PAGE ═══ */
  function isAutoPartsProduct() {
    var loc = window.location.href;
    if (loc.indexOf('/items/') === -1) return false;
    /* Check breadcrumbs for 186807 */
    var links = document.getElementsByTagName('a');
    for (var i = 0; i < links.length; i++) {
      if ((links[i].href || '').indexOf('186807') !== -1) return true;
    }
    var bc = document.getElementById('bread_crumbs');
    if (bc && (bc.innerHTML || '').indexOf('186807') !== -1) return true;
    return false;
  }

  /* ═══ EXTRACT PRODUCT DATA ═══ */
  function extractProductData() {
    var data = {};

    /* Title */
    var titleEl = document.getElementById('item_current_title');
    if (titleEl) {
      var h1 = titleEl.getElementsByTagName('h1')[0];
      data.title = h1 ? (h1.textContent || '').trim() : '';
    }

    /* Price — find span with class containing 'price' or search by ₪ */
    var allEls = document.getElementsByTagName('*');
    for (var pe = 0; pe < allEls.length; pe++) {
      var cn = allEls[pe].className || '';
      if (typeof cn === 'string' && cn.indexOf('price') !== -1 && allEls[pe].children.length === 0) {
        var ptxt = (allEls[pe].textContent || '').replace(/[^\d.,]/g, '').trim();
        if (ptxt && parseFloat(ptxt) > 0) { data.price = ptxt; break; }
      }
    }

    /* SKU */
    var spans = document.getElementsByTagName('span');
    for (var ce = 0; ce < spans.length; ce++) {
      var ceTxt = (spans[ce].textContent || '').trim();
      if (ceTxt.indexOf('מק"ט') !== -1 || ceTxt.indexOf('מק״ט') !== -1) {
        data.sku = ceTxt.replace(/מק"ט:?\s*|מק״ט:?\s*/g, '').trim();
        break;
      }
    }

    /* Images */
    var imgs = document.getElementsByTagName('img');
    var imageUrls = [];
    for (var im = 0; im < imgs.length; im++) {
      var src = imgs[im].src || imgs[im].getAttribute('data-src') || '';
      if (src && (src.indexOf('cloudfront') !== -1 || src.indexOf('konimbo') !== -1) && src.indexOf('logo') === -1) {
        imageUrls.push(src);
      }
    }
    data.images = imageUrls;
    data.mainImage = imageUrls[0] || '';

    /* Cart button reference */
    var allAnchors = document.getElementsByTagName('a');
    for (var ca = 0; ca < allAnchors.length; ca++) {
      if ((allAnchors[ca].textContent || '').trim().indexOf('הוסף לעגלה') !== -1) {
        data.cartElement = allAnchors[ca];
        break;
      }
    }

    /* Brand detection */
    var brands = ['BREMBO','BOSCH','MANN-FILTER','MANN FILTER','MAHLE','VALEO','TRW','FEBI','MEYLE','SKF','NGK','DENSO','SACHS','LUK','INA','CONTINENTAL','GATES','HENGST','DAYCO','TEXTAR','ATE','KNECHT','MOTUL','CASTROL','LIQUI MOLY','OSRAM','PHILIPS'];
    var titleUpper = (data.title || '').toUpperCase();
    for (var bi = 0; bi < brands.length; bi++) {
      if (titleUpper.indexOf(brands[bi]) !== -1) { data.brand = brands[bi]; break; }
    }

    /* Out of stock */
    data.inStock = !(parseFloat(data.price || '0') === 0);

    return data;
  }

  /* ═══ REPLACE PAGE CONTENT ═══ */
  function replaceContent(templateHTML, productData) {
    /* Parse template */
    var parser = new DOMParser();
    var doc = parser.parseFromString(templateHTML, 'text/html');

    /* Extract styles */
    var styles = doc.getElementsByTagName('style');
    var styleContent = '';
    for (var s = 0; s < styles.length; s++) styleContent += styles[s].textContent;

    /* Inject styles */
    var styleEl = document.createElement('style');
    styleEl.id = 'an-product-template-style';
    styleEl.textContent = styleContent;
    document.head.appendChild(styleEl);

    /* Get body content */
    var bodyHTML = doc.body.innerHTML;

    /* Replace data in template HTML string (faster than DOM manipulation) */
    var title = productData.title || '';
    var price = productData.price || '0';
    var sku = productData.sku || '';
    var brand = productData.brand || '';
    var shortTitle = title.length > 40 ? title.substring(0, 40) + '...' : title;

    /* Template has hardcoded P85126 / Brembo data — replace with actual */
    bodyHTML = bodyHTML.replace(/סט רפידות בלם, בלם דיסק קדמי — Brembo P85126/g, title);
    bodyHTML = bodyHTML.replace(/רפידות בלם קדמיות Brembo P85126/g, shortTitle);
    bodyHTML = bodyHTML.replace(/₪195/g, '₪' + price);
    bodyHTML = bodyHTML.replace(/מק״ט: P85126/g, 'מק״ט: ' + sku);
    bodyHTML = bodyHTML.replace(/>P85126</g, '>' + sku + '<');
    if (brand) bodyHTML = bodyHTML.replace(/>BREMBO</g, '>' + brand + '<');

    /* Replace product image if available */
    if (productData.mainImage) {
      /* Replace the SVG placeholder with actual image */
      var svgStart = bodyHTML.indexOf('<svg viewBox="0 0 400 400"');
      var svgEnd = bodyHTML.indexOf('</svg>', svgStart);
      if (svgStart !== -1 && svgEnd !== -1) {
        bodyHTML = bodyHTML.substring(0, svgStart) + 
          '<img src="' + productData.mainImage + '" alt="' + title + '" style="width:100%;height:100%;object-fit:contain;">' +
          bodyHTML.substring(svgEnd + 6);
      }
    }

    /* Find page content area and replace */
    var pageContent = document.getElementById('page_content') || document.getElementById('item_show');
    if (!pageContent) {
      /* Try to find main content wrapper */
      var allDivs = document.getElementsByTagName('div');
      for (var d = 0; d < allDivs.length; d++) {
        var did = allDivs[d].id || '';
        if (did === 'page_content' || did === 'content' || did === 'item_show' || did === 'main_content') {
          pageContent = allDivs[d]; break;
        }
      }
    }

    if (!pageContent) {
      /* Last resort: can't find content area, abort */
      console.log('AN: Could not find page content area, aborting template injection');
      return;
    }

    /* Create wrapper with template content */
    var wrapper = document.createElement('div');
    wrapper.id = 'an-product-page';
    wrapper.innerHTML = bodyHTML;

    /* Remove template's header/footer/topbar (keep Konimbo's) */
    var children = wrapper.children;
    var removeList = [];
    for (var c = 0; c < children.length; c++) {
      var cn2 = children[c].className || '';
      var tag = children[c].tagName || '';
      if (cn2.indexOf('top-bar') !== -1 || tag === 'HEADER' || cn2.indexOf('footer') !== -1) {
        removeList.push(children[c]);
      }
    }
    for (var r = 0; r < removeList.length; r++) {
      wrapper.removeChild(removeList[r]);
    }

    /* Wire buy buttons to real Konimbo cart */
    if (productData.cartElement) {
      var btns = wrapper.getElementsByTagName('button');
      for (var b = 0; b < btns.length; b++) {
        if ((btns[b].className || '').indexOf('btn-primary') !== -1 || 
            (btns[b].textContent || '').indexOf('הוסף לעגלה') !== -1) {
          (function(btn, cartEl) {
            btn.addEventListener('click', function(e) {
              e.preventDefault();
              cartEl.click();
            });
          })(btns[b], productData.cartElement);
        }
      }
    }

    /* NOW hide original content and show template */
    pageContent.style.display = 'none';
    pageContent.parentElement.insertBefore(wrapper, pageContent.nextSibling);

    /* Execute template scripts */
    var scripts = wrapper.getElementsByTagName('script');
    for (var sc = scripts.length - 1; sc >= 0; sc--) {
      var newScript = document.createElement('script');
      newScript.textContent = scripts[sc].textContent;
      scripts[sc].parentElement.removeChild(scripts[sc]);
      document.body.appendChild(newScript);
    }
  }

  /* ═══ MAIN ═══ */
  function init() {
    if (!isAutoPartsProduct()) return;

    var productData = extractProductData();
    if (!productData.title) return; /* No product data found, don't touch the page */

    /* Load template with timeout fallback */
    var xhr = new XMLHttpRequest();
    xhr.open('GET', TEMPLATE_URL + '?v=' + Date.now(), true);
    xhr.timeout = TIMEOUT_MS;

    xhr.onload = function() {
      if (xhr.status === 200 && xhr.responseText.length > 1000) {
        replaceContent(xhr.responseText, productData);
      }
    };

    /* On error or timeout: do nothing, original page stays visible */
    xhr.onerror = function() {};
    xhr.ontimeout = function() {};

    xhr.send();
  }

  /* Run after page is fully loaded */
  if (document.readyState === 'complete') {
    setTimeout(init, 300);
  } else {
    window.addEventListener('load', function() {
      setTimeout(init, 300);
    });
  }
})();
</script>
