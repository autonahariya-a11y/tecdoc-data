  if (bcLabel && bcHref.indexOf('#') === -1 && bcHref !== window.location.href) {
    categoryLabel = bcLabel;
  }
  }
  var targetInsertEl = document.getElementById('item_show') ||
  document.getElementById('item_details') ||
  document.getElementById('item_content') ||
  document.getElementById('content_area');
  if (!targetInsertEl) {
  var mains = document.getElementsByTagName('main');
  if (mains.length) targetInsertEl = mains[0];
  }
  if (!targetInsertEl) return; // Can't find insertion point
  var tecdocWidget = document.getElementById('tecdoc-widget');
  var svgPlaceholder = '<svg viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">' +
  '<rect width="400" height="400" fill="#f7f8fa"/>' +
  '<g transform="translate(200, 185)">' +
  '<path d="M-95,-55 Q-100,-55 -100,-45 L-100,45 Q-100,55 -90,55 L90,55 Q100,55 100,45 L100,-45 Q100,-55 95,-55 Z" fill="#3a3a3a" stroke="#2a2a2a" stroke-width="2"/>' +
  '<path d="M-85,-45 Q-88,-45 -88,-38 L-88,38 Q-88,45 -82,45 L82,45 Q88,45 88,38 L88,-38 Q88,-45 85,-45 Z" fill="#5a5a5a"/>' +
  '<line x1="-60" y1="-30" x2="-60" y2="30" stroke="#4a4a4a" stroke-width="2"/>' +
  '<line x1="-20" y1="-30" x2="-20" y2="30" stroke="#4a4a4a" stroke-width="2"/>' +
  '<line x1="20" y1="-30" x2="20" y2="30" stroke="#4a4a4a" stroke-width="2"/>' +
  '<line x1="60" y1="-30" x2="60" y2="30" stroke="#4a4a4a" stroke-width="2"/>' +
  '<rect x="-70" y="-8" width="30" height="3" rx="1.5" fill="' + brandData.color + '" opacity="0.6"/>' +
  '</g>' +
  '<rect x="130" y="280" width="140" height="32" rx="6" fill="' + brandData.color + '"/>' +
  '<text x="200" y="302" text-anchor="middle" fill="#fff" font-size="14" font-weight="900" font-family="Arial, sans-serif" letter-spacing="2">' + brandData.name.toUpperCase() + '</text>' +
  '</svg>';
  var mainImageHtml = '';
  var thumbnailsHtml = '';
  if (imageUrls.length > 0) {
  mainImageHtml = '<img src="' + imageUrls[0] + '" alt="' + productTitle + '" id="an-main-img">';
  for (var ti = 0; ti < Math.min(imageUrls.length, 5); ti++) {
    var activeClass = ti === 0 ? ' active' : '';
    thumbnailsHtml += '<div class="image-thumb' + activeClass + '" data-an-img="' + imageUrls[ti] + '">' +
      '<img src="' + imageUrls[ti] + '" alt="תמונה ' + (ti+1) + '">' +
      '</div>';
  }
  } else {
  mainImageHtml = svgPlaceholder;
  thumbnailsHtml = '<div class="image-thumb active">' + svgPlaceholder + '</div>';
  }
  var stickyThumbHtml = imageUrls.length > 0
  ? '<img src="' + imageUrls[0] + '" alt="' + productTitle + '">'
  : '<svg viewBox="0 0 40 40" fill="none"><rect width="40" height="40" rx="4" fill="#f0f0f0"/><rect x="5" y="10" width="30" height="20" rx="4" fill="' + brandData.color + '" opacity="0.2"/><text x="20" y="23" text-anchor="middle" fill="' + brandData.color + '" font-size="5" font-weight="900" font-family="Arial">' + brandData.name.toUpperCase().substring(0,6) + '</text></svg>';
  var breadcrumbHtml = '';
  if (breadcrumbItems.length > 0) {
  for (var bci = 0; bci < breadcrumbItems.length; bci++) {
    breadcrumbHtml += '<a href="' + breadcrumbItems[bci].href + '">' + breadcrumbItems[bci].text + '</a><span>\u203a</span>';
  }
  } else {
  breadcrumbHtml = '<a href="/">\u05d3\u05e3 \u05d4\u05d1\u05d9\u05ea</a><span>\u203a</span>' +
    '<a href="#">\u05d7\u05dc\u05e7\u05d9 \u05d1\u05dc\u05de\u05d9\u05dd</a><span>\u203a</span>';
  }
  breadcrumbHtml += '<span>' + productTitle.substring(0, 60) + '</span>';
  var cleanPrice = productPrice.replace(/[₪\u20aa]/g, '').trim();
  var priceDisplay = cleanPrice ? '&#8362;' + cleanPrice : '';
  if (!priceDisplay && priceEl) priceDisplay = getText(priceEl);
  // Build brand-only highlights (no store policies like shipping/warranty)
  var highlights = [];
  var descSentences = brandData.description ? brandData.description.split('.').filter(function(s) { return s.trim().length > 5; }) : [];
  // First highlight: brand name + first sentence
  if (descSentences.length > 0) {
    highlights.push(brandData.name + ' \u2014 ' + descSentences[0].trim());
  } else {
    highlights.push(brandData.name + ' \u2014 \u05d9\u05e6\u05e8\u05df \u05de\u05d5\u05d1\u05d9\u05dc \u05dc\u05e8\u05db\u05d1');
  }
  // Second highlight: second sentence of description or OEM supplier note
  if (descSentences.length > 1) {
    highlights.push(descSentences[1].trim());
  } else {
    highlights.push('\u05e1\u05e4\u05e7\u05d9\u05ea \u05e6\u05d9\u05d5\u05d3 \u05de\u05e7\u05d5\u05e8\u05d9 \u05dc\u05d9\u05e6\u05e8\u05e0\u05d9\u05d5\u05ea \u05d4\u05e8\u05db\u05d1');
  }
  // Third highlight: country + founded year
  if (brandData.country && brandData.founded) {
    highlights.push('\u05de\u05d5\u05e6\u05d0 ' + brandData.country + ' \u2014 \u05de\u05d0\u05d6 ' + brandData.founded);
  } else if (brandData.country) {
    highlights.push('\u05de\u05d5\u05e6\u05d0 ' + brandData.country);
  } else if (descSentences.length > 2) {
    highlights.push(descSentences[2].trim());
  }
  // Fourth highlight: third sentence if available
  if (descSentences.length > 2 && highlights.length < 4) {
    highlights.push(descSentences[2].trim());
  }
  var highlightsHtml = '';
  for (var hl = 0; hl < highlights.length; hl++) {
  highlightsHtml += '<li>' + highlights[hl] + '</li>';
  }
  var cartSvg = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>';
  var cartSvgSm = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>';
  var html = '';
  html += '<nav class="an-breadcrumb">';
  html += '<div class="an-breadcrumb-inner">' + breadcrumbHtml + '</div>';
  html += '</nav>';
  html += '<div class="an-container">';
  html += '<div class="product-layout" id="an-product-main">';
  html += '<div class="product-image-section">';
  html += '<div class="product-image-main">';
  html += mainImageHtml;
  html += '</div>';
  html += '<div class="image-thumbnails">' + thumbnailsHtml + '</div>';
  html += '</div>'; // end product-image-section
  html += '<div class="product-info">';
  html += '<div class="brand-badge">';
  html += '<span class="brand-badge-logo" style="background:' + brandData.color + '">' + brandData.name.toUpperCase().substring(0, 8) + '</span>';
  html += '</div>';
  html += '<h1 class="product-title">' + productTitle + '</h1>';
  html += '<div class="product-subtitle">' + productSubtitle + '</div>';
  html += '<div class="product-meta">';
  html += '</div>';
  html += '<div class="stock-indicator">';
  html += '<span class="stock-dot"></span>';
  html += '\u05d1\u05de\u05dc\u05d0\u05d9';
  html += '</div>';
  html += '<div class="divider"></div>';
  html += '<div class="price-section">';
  html += '<div class="price-main">' + priceDisplay + '</div>';
  html += '<div class="price-vat">\u05db\u05d5\u05dc\u05dc \u05de\u05e2\u05f3\u05de</div>';
  html += '</div>';
  // Placeholder for original Konimbo cart elements (will be moved here after build)
  html += '<div id="an-cart-area"></div>';
  html += '<div class="sold-by">\u05e0\u05de\u05db\u05e8 \u05d5\u05e0\u05e9\u05dc\u05d7 \u05e2\u05dc \u05d9\u05d3\u05d9 <strong>\u05d0\u05d5\u05d8\u05d5 \u05e0\u05d4\u05e8\u05d9\u05d4</strong></div>';
  html += '<div class="trust-box">';
  html += '<div class="trust-item"><span class="trust-icon">\uD83D\uDE9A</span><span>\u05de\u05e9\u05dc\u05d5\u05d7 \u05e2\u05d3 7 \u05d9\u05de\u05d9 \u05e2\u05e1\u05e7\u05d9\u05dd \u05dc\u05db\u05dc \u05d4\u05d0\u05e8\u05e5</span></div>';
  html += '<div class="trust-item"><span class="trust-icon">\uD83D\uDEE1\uFE0F</span><span>\u05d0\u05d7\u05e8\u05d9\u05d5\u05ea 3 \u05d7\u05d5\u05d3\u05e9\u05d9\u05dd / 6,000 \u05e7\u05f3\u05de</span></div>';
  html += '<div class="trust-item"><span class="trust-icon">\uD83C\uDFC6</span><span>\u05de\u05d5\u05e8\u05e9\u05d9\u05dd \u05de\u05e9\u05e8\u05d3 \u05d4\u05ea\u05d7\u05d1\u05d5\u05e8\u05d4</span></div>';
  html += '<div class="trust-item"><span class="trust-icon">\uD83D\uDD12</span><span>\u05ea\u05e9\u05dc\u05d5\u05dd \u05de\u05d0\u05d5\u05d1\u05d8\u05d7 \u2014 SSL \u05de\u05d5\u05e6\u05e4\u05df</span></div>';
  html += '<div class="trust-item"><span class="trust-icon">\uD83D\uDCB3</span><span>\u05d0\u05e4\u05e9\u05e8\u05d5\u05ea \u05ea\u05e9\u05dc\u05d5\u05de\u05d9\u05dd \u05d1\u05e7\u05d5\u05e4\u05d4</span></div>';
  html += '</div>'; // trust-box
  html += '<div class="highlights-box open" id="an-highlights-box">';
  html += '<div class="highlights-header" id="an-highlights-header">';
  html += '<span class="highlights-icon">&#10022;</span>';
  html += '<span class="highlights-title">\u05d1\u05d9\u05e6\u05d5\u05e2\u05d9\u05dd, \u05d0\u05d9\u05db\u05d5\u05ea \u05d5\u05e0\u05d5\u05d7\u05d5\u05ea.</span>';
  html += '<svg class="highlights-chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>';
  html += '</div>';
  html += '<div class="highlights-content">';
  html += '<div class="highlights-inner"><ul>' + highlightsHtml + '</ul></div>';
  html += '</div>';
  html += '</div>'; // highlights-box
  html += '</div>'; // end product-info
  html += '<div class="desc-section-wrap">';
  html += '<div class="desc-section">';
  html += '<h2 class="desc-heading">\u05ea\u05d9\u05d0\u05d5\u05e8</h2>';
  html += '<div class="specs-table" id="an-specs-table">';
  if (brandData.name && brandData.name !== '\u05d9\u05e6\u05e8\u05df') {
  html += '<div class="specs-row"><div class="specs-label">\u05d9\u05e6\u05e8\u05df</div><div class="specs-value">' + brandData.name + '</div></div>';
  }
  if (skuValue) {
  html += '<div class="specs-row"><div class="specs-label">\u05de\u05e7\u05f3\u05d8</div><div class="specs-value">' + skuValue + '</div></div>';
  }
  if (categoryLabel) {
  html += '<div class="specs-row"><div class="specs-label">\u05e7\u05d8\u05d2\u05d5\u05e8\u05d9\u05d4</div><div class="specs-value">' + categoryLabel + '</div></div>';
  }
  html += '<div class="specs-row"><div class="specs-label">\u05d0\u05d7\u05e8\u05d9\u05d5\u05ea</div><div class="specs-value">3 \u05d7\u05d5\u05d3\u05e9\u05d9\u05dd / 6,000 \u05e7\u05f3\u05de</div></div>';
  html += '</div>'; // specs-table
  html += '</div>'; // desc-section
  html += '<div class="brand-section">';
  html += '<div class="brand-section-header">';
  var bc = brandData.color || '#1B4E91';
  var brandAbbr = brandData.name.toUpperCase();
  if (brandAbbr.length > 5) brandAbbr = brandAbbr.substring(0, 5);
  var abbrSize = brandAbbr.length > 4 ? '10' : (brandAbbr.length > 3 ? '11' : '13');
  html += '<div class="brand-logo-box" style="background:' + bc + ';display:flex;align-items:center;justify-content:center;border-radius:8px">' +
  '<span style="color:#fff;font-size:' + abbrSize + 'px;font-weight:900;letter-spacing:0.5px;font-family:Arial,Helvetica,sans-serif;line-height:1">' + brandAbbr + '</span></div>';
  html += '<div class="brand-section-info">';
  html += '<h3>' + brandData.name + '</h3>';
  html += '<span>' + (brandData.country ? brandData.country + (brandData.founded ? ', ' + brandData.founded : '') : '') + '</span>';
  html += '</div>';
  html += '</div>';
  html += '<p style="font-size:13px;color:#666;line-height:1.6;">' + brandData.description + '</p>';
  html += '</div>'; // brand-section
  html += '<div class="an-tecdoc-wrap" id="an-tecdoc-wrap"></div>';
  html += '</div>'; // end desc-section-wrap
  html += '</div>'; // end product-layout
  html += '</div>'; // end container
  var wrapper = document.createElement('div');
  wrapper.id = 'an-product-redesign';
  wrapper.innerHTML = html;
  targetInsertEl.parentNode.insertBefore(wrapper, targetInsertEl);

  // Move the TecDoc widget's .tw-purchase-row (cart + qty) into our layout.
  // This row contains the REAL .commit_to_real cart link + .tw-qty-selector.
  // It's created by widget.js which loads async, so we use polling + observer.
  var cartRowMoved = false;
  function moveCartRow() {
    if (cartRowMoved) return true;
    var cartArea = document.getElementById('an-cart-area');
    if (!cartArea) return false;
    var twRow = document.querySelector('.tw-purchase-row');
    if (twRow) {
      // Clear any old placeholder content in cart area
      cartArea.innerHTML = '';
      cartArea.appendChild(twRow);
      cartRowMoved = true;
      return true;
    }
    return false;
  }
  // Try immediately and with increasing timeouts
  if (!moveCartRow()) {
    var cartTimers = [300, 800, 1500, 3000, 5000, 8000, 12000];
    for (var ct = 0; ct < cartTimers.length; ct++) {
      (function(delay) {
        setTimeout(function() { moveCartRow(); }, delay);
      })(cartTimers[ct]);
    }
    // Also use MutationObserver to catch it immediately when widget creates it
    if (typeof MutationObserver !== 'undefined') {
      var cartObs = new MutationObserver(function(mutations) {
        if (moveCartRow()) cartObs.disconnect();
      });
      cartObs.observe(document.body, { childList: true, subtree: true });
      // Safety: disconnect after 15 seconds
      setTimeout(function() { cartObs.disconnect(); }, 15000);
    }
  }

  function moveTecDoc() {
  var tw = document.getElementById('tecdoc-widget');
  var wrap = document.getElementById('an-tecdoc-wrap');
  if (tw && wrap && !wrap.children.length) {
    wrap.appendChild(tw);
    tw.style.display = 'block';
    return true;
  }
  return false;
  }
  if (!moveTecDoc()) {
  setTimeout(moveTecDoc, 1000);
  setTimeout(moveTecDoc, 3000);
  setTimeout(moveTecDoc, 6000);
  setTimeout(moveTecDoc, 10000);
  setTimeout(moveTecDoc, 15000);
  }
  var bCls = document.body.className || '';
  if (bCls.indexOf('an-redesigned') === -1) {
  document.body.className = bCls + (bCls ? ' ' : '') + 'an-redesigned';
  }
  var shortTitle = productTitle.length > 30 ? productTitle.substring(0, 30) + '...' : productTitle;
  var stickyBarHtml = '<div id="an-sticky-bar">' +
  '<div class="sticky-bar-inner">' +
  '<div class="sticky-bar-info">' +
  '<span class="sticky-bar-title">' + shortTitle + '</span>' +
  '<span class="sticky-bar-price">' + priceDisplay + '</span>' +
  '</div>' +
  '<div class="sticky-bar-actions">' +
  '<button class="btn-primary" id="an-sticky-buy-btn">' + cartSvgSm + ' \u05d4\u05d5\u05e1\u05e3 \u05dc\u05e2\u05d2\u05dc\u05d4</button>' +
  '</div>' +
  '</div>' +
  '</div>';
  var stickyContainer = document.createElement('div');
  stickyContainer.innerHTML = stickyBarHtml;
  document.body.appendChild(stickyContainer.firstChild);
  // Sticky bar buy button — clicks the real cart link
  var stickyBuyBtn = document.getElementById('an-sticky-buy-btn');
  if (stickyBuyBtn) {
    stickyBuyBtn.addEventListener('click', function(e) {
      e.preventDefault();
      var realBtn = document.querySelector('.commit_to_real');
      if (realBtn) realBtn.click();
    });
  }
  var thumbEls = document.querySelectorAll('#an-product-redesign .image-thumb[data-an-img]');
  var mainImg = document.getElementById('an-main-img');
  for (var th = 0; th < thumbEls.length; th++) {
  (function(thumb) {
    thumb.addEventListener('click', function() {
      var redesignEl2 = document.getElementById('an-product-redesign');
      var allThumbs = redesignEl2 ? redesignEl2.querySelectorAll('[data-an-img], .image-thumb') : [];
      for (var t = 0; t < allThumbs.length; t++) {
        var cls = allThumbs[t].className;
        allThumbs[t].className = cls.replace(/\s*active/g, '');
      }
      var cls2 = thumb.className;
      thumb.className = cls2 + ' active';
      if (mainImg) {
        mainImg.src = thumb.getAttribute('data-an-img');
      }
    });
  })(thumbEls[th]);
  }
  var stickyBar = document.getElementById('an-sticky-bar');
  var productMainEl = document.getElementById('an-product-main');
  var stickyVisible = false;
  function checkSticky() {
  if (!productMainEl || !stickyBar) return;
  var rect = productMainEl.getBoundingClientRect();
  var shouldShow = rect.top < -200;
  if (shouldShow !== stickyVisible) {
    stickyVisible = shouldShow;
    var sbCls = stickyBar.className;
    if (shouldShow) {
      if (sbCls.indexOf('visible') === -1) stickyBar.className = sbCls + ' visible';
    } else {
      stickyBar.className = sbCls.replace(/\s*visible/g, '');
    }
  }
  }
  window.addEventListener('scroll', checkSticky, { passive: true });
  var highlightsHeader = document.getElementById('an-highlights-header');
  var highlightsBox = document.getElementById('an-highlights-box');
  if (highlightsHeader && highlightsBox) {
  highlightsHeader.addEventListener('click', function() {
    var hcls = highlightsBox.className;
    if (hcls.indexOf('open') !== -1) {
      highlightsBox.className = hcls.replace(/\s*open/g, '');
    } else {
      highlightsBox.className = hcls + ' open';
    }
  });
  }
  var descExpandBtn = document.getElementById('an-desc-expand-btn');
  var descExtra = document.getElementById('an-desc-extra');
  if (descExpandBtn && descExtra) {
  descExpandBtn.addEventListener('click', function(e) {
    e.preventDefault();
    e.stopPropagation();
    var ecls = descExtra.className;
    var bcls = descExpandBtn.className;
    var isOpen = ecls.indexOf('open') !== -1;
    if (isOpen) {
      descExtra.className = ecls.replace(/\s*open/g, '');
      descExpandBtn.className = bcls.replace(/\s*expanded/g, '');
      descExpandBtn.childNodes[0].textContent = '\u05e2\u05d5\u05d3 ';
    } else {
      descExtra.className = ecls + ' open';
      descExpandBtn.className = bcls + ' expanded';
      descExpandBtn.childNodes[0].textContent = '\u05e4\u05d7\u05d5\u05ea ';
    }
  });
  }
})();
</script>
